<VirtualHost *:80>
	# The ServerName directive sets the request scheme, hostname and port that
	# the server uses to identify itself. This is used when creating
	# redirection URLs. In the context of virtual hosts, the ServerName
	# specifies what hostname must appear in the request's Host: header to
	# match this virtual host. For the default virtual host (this file) this
	# value is not decisive as it is used as a last resort host regardless.
	# However, you must set it for any further virtual host explicitly.
	#ServerName www.example.com

	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/grow

	# Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
	# error, crit, alert, emerg.
	# It is also possible to configure the loglevel for particular
	# modules, e.g.
	#LogLevel info ssl:warn

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# For most configuration files from conf-available/, which are
	# enabled or disabled at a global level, it is possible to
	# include a line for only one particular virtual host. For example the
	# following line enables the CGI configuration for this host only
	# after it has been globally disabled with "a2disconf".
	#Include conf-available/serve-cgi-bin.conf
	#
	<Directory ${GROW_STATIC_ROOT}>
		Require all granted
	</Directory>
	<Directory ${GROW_MEDIA_ROOT}>
		Require all granted
		AllowOverride all

		AuthType Form
		AuthName "ControlledAccess"
		AuthFormProvider wsgi
		AuthFormLoginRequiredLocation /accounts/login?next=%{REQUEST_URI}

		WSGIAuthUserScript /app/django_project/auth_wsgi.py
		WSGIAuthGroupScript /app/django_project/auth_wsgi.py

		<FilesMatch "\.ht(access|passwd|group|perm|permissions|.?)$">
			Require all denied
		</FilesMatch>
	</Directory>

	<Location "/accounts/__a2login__/">
		Require all granted
		SetHandler form-login-handler
    	AuthFormLoginRequiredLocation /accounts/a2login
    	AuthFormLoginSuccessLocation %{REQUEST_URI}
    	AuthFormProvider wsgi
		WSGIAuthUserScript /app/django_project/auth_wsgi.py
		WSGIAuthGroupScript /app/django_project/auth_wsgi.py
    	AuthType form
    	AuthName ControlledAccess

    	Session On
    	SessionCookieName a2session path=/
	</Location>

	<Location "/accounts/a2logout">
		Require all granted
	</Location>

	<Directory "/app/django_project">
		<Files "(auth(z)?_)?wsgi.py">
			Require all granted
		</Files>
	</Directory>
	<Directory "/app/*">
			Require all denied
	</Directory>
	<Directory "/var/www/grow">
			Require all denied
	</Directory>

	Alias /static/ /var/www/grow/static/
	Alias /media/ /var/www/grow/media/

	<If $GROW_DATABASE_URL == ''>
		<If $DATABASE_URL == ''>
			SetEnv GROW_DATABASE_URL "sqlite:////data/db.sqlite3"
		</If>
		<Else>
			SetEnv GROW_DATABASE_URL ${DATABASE_URL}
		</Else>
	</If>

	<If $GROW_DEBUG == ''>
		<If $DEBUG == ''>
			SetEnv GROW_DEBUG "0"
		</If>
		<Else>
			SetEnv GROW_DEBUG ${DEBUG}
		</Else>
	</If>

	<If $GROW_ALLOWED_HOSTS == ''>
		<If $ALLOWED_HOSTS == ''>
			SetEnv GROW_ALLOWED_HOSTS ${ALLOWED_HOSTS}
		</If>
		<Else>
			SetEnv GROW_ALLOWED_HOSTS ${ALLOWED_HOSTS}
		</Else>
	</If>

	<If $GROW_MEDIA_ROOT == ''>
		<If $MEDIA_ROOT == ''>
			SetEnv GROW_MEDIA_ROOT "/var/www/grow/media/"
		</If>
		<Else>
			SetEnv GROW_MEDIA_ROOT ${MEDIA_ROOT}
		</Else>
	</If>
	<If $GROW_STATIC_ROOT == ''>
		<If $STATIC_ROOT == ''>
			SetEnv GROW_STATIC_ROOT "/var/www/grow/static/"
		</If>
		<Else>
			SetEnv GROW_STATIC_ROOT ${STATIC_ROOT}
		</Else>
	</If>

	<If $GROW_DJANGO_SETTINGS_MODULE == ''>
		<If $DJANGO_SETTINGS_MODULE == ''>
			SetEnv GROW_DJANGO_SETTINGS_MODULE "django_project.settings"
		</If>
		<Else>
			SetEnv GROW_DJANGO_SETTINGS_MODULE ${DJANGO_SETTINGS_MODULE}
		</Else>
	</If>


	<If $GROW_ACCOUNT_LOGIN_METHODS == ''>
		<If $ACCOUNT_LOGIN_METHODS == ''>
			SetEnv GROW_ACCOUNT_LOGIN_METHODS "username"
		</If>
		<Else>
			SetEnv GROW_ACCOUNT_LOGIN_METHODS ${ACCOUNT_LOGIN_METHODS}
		</Else>
	</If>

	<If $GROW_HEAD_TITLE == ''>
		<If $HEAD_TITLE == ''>
			SetEnv GROW_HEAD_TITLE "Grow - Your Personal Garden Journal"
		</If>
		<Else>
			SetEnv GROW_HEAD_TITLE ${HEAD_TITLE}
		</Else>
	</If>
	<If $GROW_SITE_TITLE == ''>
		<If $SITE_TITLE == ''>
			SetEnv GROW_SITE_TITLE "Grow"
		</If>
		<Else>
			SetEnv GROW_SITE_TITLE ${SITE_TITLE}
		</Else>
	</If>
	<If $GROW_AGE_GATE_REQUIRED == ''>
		<If $AGE_GATE_REQUIRED == ''>
			SetEnv GROW_AGE_GATE_REQUIRED "0"
		</If>
		<Else>
			SetEnv GROW_AGE_GATE_REQUIRED ${AGE_GATE_REQUIRED}
		</Else>
	</If>
	<If $GROW_AGE_GATE_NAME == ''>
		<If $AGE_GATE_NAME == ''>
			SetEnv GROW_AGE_GATE_NAME "age_gate"
		</If>
		<Else>
			SetEnv GROW_AGE_GATE_NAME ${AGE_GATE_NAME}
		</Else>
	</If>
	<If $GROW_AGE_GATE_MINIMUM_AGE == ''>
		<If $AGE_GATE_MINIMUM_AGE == ''>
			SetEnv GROW_AGE_GATE_MINIMUM_AGE "18"
		</If>
		<Else>
			SetEnv GROW_AGE_GATE_MINIMUM_AGE ${AGE_GATE_MINIMUM_AGE}
		</Else>
	</If>
	<If $GROW_AGE_GATE_REJECTED_URL == ''>
		<If $AGE_GATE_REJECTED_URL == ''>
			SetEnv GROW_AGE_GATE_REJECTED_URL "https://www.google.com"
		</If>
		<Else>
			SetEnv GROW_AGE_GATE_REJECTED_URL ${AGE_GATE_REJECTED_URL}
		</Else>
	</If>
	<If $GROW_COOKIES_CONSENT_REQUIRED == ''>
		<If $COOKIES_CONSENT_REQUIRED == ''>
			SetEnv GROW_COOKIES_CONSENT_REQUIRED "0"
		</If>
		<Else>
			SetEnv GROW_COOKIES_CONSENT_REQUIRED ${COOKIES_CONSENT_REQUIRED}
		</Else>
	</If>
	<If $GROW_COOKIES_CONSENT_NAME == ''>
		<If $COOKIES_CONSENT_NAME == ''>
			SetEnv GROW_COOKIES_CONSENT_NAME "cookies_consent"
		</If>
		<Else>
			SetEnv GROW_COOKIES_CONSENT_NAME ${COOKIES_CONSENT_NAME}
		</Else>
	</If>
	<If $GROW_SESSION_COOKIE_NAME == ''>
		<If $SESSION_COOKIE_NAME == ''>
			SetEnv GROW_SESSION_COOKIE_NAME "sessionid"
		</If>
		<Else>
			SetEnv GROW_SESSION_COOKIE_NAME ${SESSION_COOKIE_NAME}
		</Else>
	</If>
	<If $GROW_WEBSOCKETS_ENABLED == ''>
		<If $WEBSOCKETS_ENABLED == ''>
			SetEnv GROW_WEBSOCKETS_ENABLED "0"
		</If>
		<Else>
			SetEnv GROW_WEBSOCKETS_ENABLED ${WEBSOCKETS_ENABLED}
		</Else>
	</If>
	<If $GROW_WEBSOCKETS_ENABLED = "(1|[Tt][Rr][Uu][Ee]|[Oo][Nn]|[Yy]|[Yy][Ee][Ss])">
		<If $GROW_WEBSOCKETS_HOST == ''>
			<If $WEBSOCKETS_HOST == ''>
				SetEnv GROW_WEBSOCKETS_HOST %{SERVER_NAME}
			</If>
			<Else>
				SetEnv GROW_WEBSOCKETS_HOST ${WEBSOCKETS_HOST}
			</Else>
		</If>
		PassEnv GROW_WEBSOCKETS_HOST

		<If $GROW_WEBSOCKETS_PORT == ''>
			<If $WEBSOCKETS_PORT == ''>
				SetEnv GROW_WEBSOCKETS_PORT "80"
			</If>
			<Else>
				SetEnv GROW_WEBSOCKETS_PORT ${WEBSOCKETS_PORT}
			</Else>
		</If>
		PassEnv GROW_WEBSOCKETS_PORT
	</If>

	PassEnv GROW_DATABASE_URL
	PassEnv GROW_DEBUG
	PassEnv GROW_ALLOWED_HOSTS
	PassEnv GROW_MEDIA_ROOT
	PassEnv GROW_STATIC_ROOT
	PassEnv GROW_DJANGO_SETTINGS_MODULE
	PassEnv GROW_ACCOUNT_LOGIN_METHODS
	PassEnv GROW_HEAD_TITLE
	PassEnv GROW_SITE_TITLE
	PassEnv GROW_AGE_GATE_REQUIRED
	PassEnv GROW_AGE_GATE_NAME
	PassEnv GROW_AGE_GATE_MINIMUM_AGE
	PassEnv GROW_AGE_GATE_REJECTED_URL
	PassEnv GROW_COOKIES_CONSENT_REQUIRED
	PassEnv GROW_COOKIES_CONSENT_NAME
	PassEnv GROW_SESSION_COOKIE_NAME

	PassEnv GROW_WEBSOCKETS_ENABLED

	WSGIDaemonProcess grow python-home=/app/.venv python-path=/app
	WSGIProcessGroup grow
	WSGIScriptAlias / /app/django_project/wsgi.py
	WSGIApplicationGroup %{GLOBAL}

	<If Environment GROW_DEBUG = "(1|[Tt][Rr][Uu][Ee]|[Oo][Nn]|[Yy]|[Yy][Ee][Ss])">
		WSGIScriptReloading On
	</If>
	<If Environment GROW_WEBSOCKETS = "(1|[Tt][Rr][Uu][Ee]|[Oo][Nn]|[Yy]|[Yy][Ee][Ss])">
		<If $GROW_WEBOSCKETS_HOST == ''>
			SetEnv GROW_WEBOSCKETS_HOST "localhost"
		</If>
		<If $GROW_WEBOSCKETS_PORT == ''>
			SetEnv GROW_WEBOSCKETS_PORT "8001"
		</If>
		# ProxyPass /ws/ ws://${GROW_WEBOSCKETS_HOST}:${GROW_WEBOSCKETS_PORT}/
		# ProxyPassReverse /ws/ ws://${GROW_WEBOSCKETS_HOST}:${GROW_WEBOSCKETS_PORT}/
	</If>
</VirtualHost>
