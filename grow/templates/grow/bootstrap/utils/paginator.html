{% load i18n %}
<nav aria-label="{% translate 'Pagination' %}" class="d-flex justify-content-start text-end mb-2">
    <ul class="pagination pagination-sm mb-0">
        {% for page in paginator.pagination %}
        <li class="page-item page-item-sm {% if page.current_page %}active{% endif %}">
            <button class="page-link page-link-sm {% if page.current_page %}active{% endif %}"
                type="button"
                {#{% if not page.current_page %}#}
                 hx-get="{{ page.url }}"
                 hx-target="{{ hx_target }}"
                 hx-swap="innerHTML"
                {#{% endif %}#}
            >
                {% if page.bs_icon %}<i class="bi bi-{{ page.bs_icon }}"></i>{% endif %}
                {% if not page.bs_icon %}{% if page.text %}{{ page.text }}{% else %}{{ page.number }}{% endif %}{% endif %}
            </button>
        </li>
        {% endfor %}
    </ul>
</nav>
