<div class="modal-dialog modal-dialog-md">
    <div class="modal-content">
        <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">{% translate "Delete Image" %}</h5>
            <button type="button" class="btn-close text-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form method="post">
            <div class="modal-body">
                {% csrf_token %}
                <p>{% translate "Are you sure you want to delete this image?" %}</p>
                <div class="alert alert-danger"><strong>{% translate "This action cannot be undone!" %}</strong></div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-danger">{% translate "Delete Image" %}</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% translate "Cancel" %}</button>
            </div>
        </form>
    </div>
</div>
