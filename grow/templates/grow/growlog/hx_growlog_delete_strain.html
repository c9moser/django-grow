{% load i18n%}
<div class="modal-dialog modal-dialog-centered" id="growlog-delete-strain-modal">
    <div class="modal-content">
        <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">{% translate "Delete grow log entry" %}</h5>
            <button type="button" class="btn-close text-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="modal-body">
                <p>{% translate "Are you sure you want to delete this strain from your grow log?" %}</p>
                <div class="alert alert-danger"><strong>{% translate "This action cannot be undone!" %}</strong></div>
            </div>
            <div class="modal-footer text-end">
                <button class="btn btn-danger" type="submit" hx-post="{% url 'grow:hx-growlog-strain-delete' pk=growlog_strain.id %}" hx-target="#growlog-strains" hx-swap="innerHTML" data-bs-dismiss="modal">{% translate "Delete entry" %}</button>
                <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">{% translate "Cancel" %}</button>
            </div>
        </form>
    </div>
</div>
<script>htmx.process(document.getElementById('growlog-delete-strain-modal'));</script>
