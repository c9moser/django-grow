{% extends "grow/strain/strain_comment_form.html" %}
{% load i18n %}

{% block form_buttons %}
{% if use_bootstrap %}
<button type="submit" class="btn btn-primary"><i class="bi bi-check"></i>{% translate "Update Comment" %}</button>
<a href="{% url 'grow:strain-detail' breeder_slug=strain.breeder.slug slug=strain.slug %}"
    class="btn btn-secondary ms-2"
><i class="bi bi-x"></i> {% translate "Back to strain" %}</a>
{% else %}
<button type="submit">{% translate "Update Comment" %}</button>
<button type="button"
    onclick="location.href='{% url 'grow:strain-detail' breeder_slug=strain.breeder.slug slug=strain.slug %}'"
>{% translate "Back to strain" %}</button>
{% endif %}
{% endblock %}
