{% extends "grow/strain/breeder_form.html" %}

{% load i18n %}
{% block form_buttons %}
{% if use_bootstrap %}
    <button type="submit" class="btn btn-success">
        <i class="bi bi-check"></i>
        {% translate "Save changes "%}
    </button>
    <a href="{% url 'grow:breeder-detail' slug=breeder.slug %}"
        class="btn btn-secondary"
    >
        <i class="bi bi-x"></i>
        {% translate "Cancel" %}
    </a>
{% endif %}
{% endblock %}
