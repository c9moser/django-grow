{% load i18n %}
{% for page in paginator.pagination %}
    <a href="#"
        {% if not page.current_page %}
         hx-get="{{ page.url }}"
         hx-target="{{ hx_target }}"
         hx-swap="innerHTML"
        {% endif %}
    >
        {% if page.text %}{{ page.text }}{% else %}{{ page.number }}{% endif %}
    </a>
</li>
{% if not forloop.last %}|{% endif %}
{% endfor %}
