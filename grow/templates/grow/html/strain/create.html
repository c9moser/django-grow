{% extends form_template %}
{% load i18n %}

{% block head_title %}{{ grow_head_title }}{% endblock %}
{% block title %}{{ grow_site_title }}: {% translate "Create strain" %}{% endblock %}

{% block form_buttons %}
<button type="submit">
    {% translate "Create Strain" %}
</button>
<button type="button" onclick="location.href='{% url 'grow:breeder-detail' slug=breeder.slug %}'">
    {% translate "Back to breeder" %}
</button>
{% endblock form_buttons %}
