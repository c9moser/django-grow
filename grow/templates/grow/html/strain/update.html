{% extends form_template %}
{% load i18n %}

{% block head_title %}{{ grow_head_title }}{% endblock %}
{% block title %}{{ grow_site_title }}: {% translate "Update strain" %}{% endblock %}

{% block form_buttons %}
<button type="submit">
    {% translate "Update Strain" %}
</button>
<button
    onclick="location.href='{% url 'grow:breeder-detail' slug=form.instance.breeder.slug %}'">
    {% translate "Back to breeder" %}
</button>
<button
    onclick="location.href='{% url 'grow:strain-detail' breeder_slug=form.instance.breeder.slug slug=form.instance.slug %}'">
    {% translate "Back to strain" %}
</button>
{% endblock %}
