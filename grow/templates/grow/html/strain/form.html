{% extends base_template %}
{% load i18n widget_tweaks %}
{% block content %}
<h1>Create Strain</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <p>
        <label for="breeder_name">{% translate "Breeder" %}</label>
        <input type="text" id="breeder_name" value="{{ breeder.name }}" readonly disabled>
    </p>
    {{ form.as_p }}
    <div id="form-buttons">
        {% block form_buttons %}{% endblock form_buttons %}
    </div>
</form>
{% endblock %}
