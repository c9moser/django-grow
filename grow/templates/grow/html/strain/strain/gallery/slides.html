{% block content %}
<div class="carousel slide" id="strain-slideshow">
    <div class="carousel-inner">
        {% for image in strain_images %}
            <div class="carousel-item">
                <img src="{% image.image.url %}"
                    class="d-block img-fluid {% if image.id == first_image.id %}active{% endif %}"
                    style="max-height: 90vh; max-width: 100%; margin: auto;"
                    alt="{{ image.caption }}">
            </div>
        {% empty %}
        <div class="crousel-item active">
            <h1>No images yet!</h1>
        </div>
        {% endfor %}
        <button class="carousel-control-prev" type="button" data-bs-target="#strain-slideshow" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#strain-slideshow" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</div>
{% endblock content %}
