[project]
name = "growroomcontroller"
version = "0.1.0"
description = ""
authors = [
    {name = "Christian Moser",email = "christian@cmoser.eu"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "django (>=6.0,<7.0)",
    "django-allauth[socialaccount] (>=65.13.1,<66.0.0)",
    "django-rest-framework (>=0.1.0,<0.2.0)",
    "pillow (>=12.0.0,<13.0.0)",
]

[tool.poetry]
packages = [
    {include = "growcontrol", from = "."}
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "flake8 (>=7.3.0,<8.0.0)"
]
postgresql = [
    "psycopg2 (>=2.9.11,<3.0.0)"
]
